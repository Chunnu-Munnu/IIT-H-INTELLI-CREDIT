version: '3.9'
services:
  mongodb:
    image: mongo:7.0
    container_name: intelli_credit_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: intelli_credit

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelli_credit_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelli_credit_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
